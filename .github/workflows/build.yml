name: Build BlockBot Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          git clone https://github.com/theos/sdks.git $THEOS/sdks

      - name: Build Package
        run: |
          make package THEOS=~/theos

      - name: Upload Dylib
        uses: actions/upload-artifact@v3
        with:
          name: DeHeBot-Dylib
          path: .theos/obj/debug/*.dylib