name: Build BlockBot Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🌟 關鍵補丁：為雲端 Mac 安裝簽名工具 (ldid)
      - name: Install ldid
        run: brew install ldid

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          rm -rf $THEOS/sdks
          git clone https://github.com/theos/sdks.git $THEOS/sdks

      - name: Build Package
        run: |
          make package THEOS=~/theos

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: DeHeBot-Dylib
          path: .theos/obj/debug/*.dylib